# Skill sets. Each machine subscribes to exactly one set at install time and
# receives that set's skills plus everything inherited up the chain.
#
# Rules (enforced by `manage.py validate-sets`):
# - exactly one root set has no `inherits`; every other set names its parent;
# - inheritance is a tree: one parent per set, no cycles;
# - every skill directory under skills/ is listed in exactly one set.

# Every machine gets the root set's skills. Language- and team-specific
# skills live in child sets; machines opt in at install time with
# `bootstrap.ps1 -SkillSet <name>`.

[global]
skills = ["agents-md"]

[python]
inherits = "global"
skills = ["python-standards"]
