name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Unit and integration tests
        run: uv run python -m unittest discover -s tests -v
      - name: Compile check
        run: uv run python -m py_compile manage.py
      - name: Validate skills
        run: uv run tools/validate_skill.py skills/*
      - name: Validate skill sets
        run: uv run manage.py validate-sets
      - name: Whitespace check
        run: git diff --check
